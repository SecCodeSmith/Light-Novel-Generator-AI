services:
  neo4j:
    image: neo4j:5-community
    container_name: lng_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/lightnovel123
      NEO4J_server_memory_pagecache_size: 256M
      NEO4J_server_memory_heap_max__size: 512M
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p lightnovel123 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: lng_redis
    restart: unless-stopped
    # persist config/logs across WSL restarts; snapshot every 60s if anything changed
    command: redis-server --save 60 1 --dir /data
    volumes:
      - redis_data:/data
    # no host port mapping: only the app container needs Redis (host 6379 may be taken)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: ./backend
    container_name: lng_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: lightnovel123
      REDIS_URL: redis://redis:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  neo4j_data:
  redis_data:
